<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>中考 & 高考英语词汇表学习</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    html,
    body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    /* 左侧目录 */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100vh;
      height: 100dvh;
      transition: margin-left .3s;
      -webkit-overflow-scrolling: touch;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar.collapsed {
      margin-left: -260px;
    }

    .sidebar-header {
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      border-bottom: 1px solid #e8e8e8;
      background: #1677ff;
      color: #fff;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .search-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .search-wrap input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 2px rgba(22, 119, 255, .1);
    }

    .tree {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 0;
    }

    .tree-node {
      user-select: none;
    }

    .tree-node-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background .15s;
      touch-action: manipulation;
    }

    .tree-node-row:hover {
      background: #f0f5ff;
    }

    .tree-node-row:active {
      background: #e6f0ff;
    }

    .tree-toggle {
      width: 16px;
      display: inline-block;
      color: #999;
      font-size: 10px;
      transition: transform .2s;
    }

    .tree-node.expanded>.tree-node-row .tree-toggle {
      transform: rotate(90deg);
    }

    .tree-label {
      flex: 1;
    }

    .tree-count {
      color: #999;
      font-size: 12px;
      margin-left: 6px;
    }

    .tree-children {
      display: none;
    }

    .tree-node.expanded>.tree-children {
      display: block;
    }

    .tree-children .tree-node-row {
      padding-left: 40px;
      font-size: 13px;
      color: #595959;
    }

    .section-icon {
      width: 16px;
      text-align: center;
      margin-right: 6px;
    }

    /* 搜索结果 */
    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .search-result-item {
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #f5f5f5;
      transition: background .15s;
    }

    .search-result-item:hover {
      background: #f0f5ff;
    }

    .search-result-item .sr-word {
      font-weight: 600;
      color: #1677ff;
    }

    .search-result-item .sr-meaning {
      color: #888;
      font-size: 12px;
      margin-top: 2px;
    }

    .search-empty {
      padding: 24px 16px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    /* 右侧 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .menu-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #595959;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .menu-btn:hover {
      background: #f0f0f0;
    }

    .topbar h2 {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .topbar .stats {
      color: #999;
      font-size: 13px;
      margin-left: auto;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .section-block {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #1677ff;
      padding: 12px 0;
      border-bottom: 2px solid #1677ff;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      background: #f5f7fa;
      z-index: 5;
    }

    .letter-group {
      margin-bottom: 24px;
    }

    .letter-header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #e6f0ff;
      border-radius: 6px;
      margin-bottom: 8px;
      position: sticky;
      top: 48px;
      z-index: 4;
    }

    .letter-header .letter {
      font-size: 18px;
      font-weight: 700;
      color: #1677ff;
    }

    .letter-header .lcount {
      margin-left: auto;
      color: #888;
      font-size: 13px;
    }

    .word-row {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 6px;
      transition: background .2s;
      cursor: default;
      margin-bottom: 2px;
    }

    .word-row:hover {
      background: #f0f5ff;
    }

    .word-row.read {
      background: #d1fae5;
    }

    .word-row.read:hover {
      background: #b8f0d5;
    }

    .speak-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 50%;
      transition: all .2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .speak-btn:hover {
      background: #1677ff;
      color: #fff;
    }

    .speak-btn.speaking {
      animation: pulse 0.6s ease-in-out infinite;
      background: #1677ff;
      color: #fff;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.25);
      }
    }

    .word-text {
      font-weight: 700;
      font-size: 15px;
      margin: 0 10px;
      color: #222;
      min-width: 120px;
    }

    .word-def {
      color: #595959;
      font-size: 14px;
      flex: 1;
    }

    .word-def .pos {
      color: #1677ff;
      font-weight: 600;
      margin-right: 4px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 100;
        box-shadow: 2px 0 8px rgba(0, 0, 0, .15);
      }

      .sidebar.collapsed {
        margin-left: -260px;
      }

      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .3);
        z-index: 99;
      }

      .overlay.show {
        display: block;
      }
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>

  </div>

；困扰", "section": "gk", "letter": "W" }, { "word": "worth", "phonetic": "worth", "pos": "a.", "meaning": "有……的价值，值得……的", "section": "gk", "letter": "W" }, { "word": "worthwhile", "phonetic": "worthwhile", "pos": "a.", "meaning": "值得做的", "section": "gk", "letter": "W" }, { "word": "would", "phonetic": "would", "pos": "v. aux.", "meaning": "将；（表示习惯、行为、习俗）老是，总会；（表示婉转的请求）请", "section": "gk", "letter": "W" }, { "word": "wound", "phonetic": "wound", "pos": "vt.", "meaning": "使受伤，伤 n. 创伤，伤口", "section": "gk", "letter": "W" }, { "word": "wrap", "phonetic": "wrap", "pos": "v.", "meaning": "包裹，包装", "section": "gk", "letter": "W" }, { "word": "wrist", "phonetic": "wrist", "pos": "n.", "meaning": "手腕，腕关节", "section": "gk", "letter": "W" }, { "word": "write", "phonetic": "write", "pos": "v.", "meaning": "写，书写；写作，著述", "section": "gk", "letter": "W" }, { "word": "wrong", "phonetic": "wrong", "pos": "a.", "meaning": "错误的；不正常的有病的 ad. 错误地", "section": "gk", "letter": "W" }, { "word": "X-ray", "phonetic": "X-ray", "pos": "n.", "meaning": "X射线；X光", "section": "gk", "letter": "X" }, { "word": "yard", "phonetic": "yard", "pos": "n.", "meaning": "码；院子；场地", "section": "gk", "letter": "Y" }, { "word": "year", "phonetic": "year", "pos": "n.", "meaning": "年", "section": "gk", "letter": "Y" }, { "word": "yellow", "phonetic": "yellow", "pos": "a.", "meaning": "黄色的", "section": "gk", "letter": "Y" }, { "word": "yes", "phonetic": "yes", "pos": "ad.", "meaning": "是，好，同意", "section": "gk", "letter": "Y" }, { "word": "yesterday", "phonetic": "yesterday", "pos": "n.", "meaning": "& ad. 昨天", "section": "gk", "letter": "Y" }, { "word": "yet", "phonetic": "yet", "pos": "ad.", "meaning": "尚，还，仍然", "section": "gk", "letter": "Y" }, { "word": "you", "phonetic": "you", "pos": "pron.", "meaning": "你；你们", "section": "gk", "letter": "Y" }, { "word": "young", "phonetic": "young", "pos": "a.", "meaning": "年轻的", "section": "gk", "letter": "Y" }, { "word": "your", "phonetic": "your", "pos": "pron.", "meaning": "你的；你们的", "section": "gk", "letter": "Y" }, { "word": "yours", "phonetic": "yours", "pos": "pron.", "meaning": "你的；你们的（名词性物主代词）", "section": "gk", "letter": "Y" }, { "word": "yourself", "phonetic": "yourself", "pos": "pron.", "meaning": "你自己", "section": "gk", "letter": "Y" }, { "word": "youth", "phonetic": "youth", "pos": "n.", "meaning": "青春；青年", "section": "gk", "letter": "Y" }, { "word": "yummy", "phonetic": "yummy", "pos": "a.", "meaning": "味道好的，好吃的", "section": "gk", "letter": "Y" }, { "word": "zebra", "phonetic": "zebra", "pos": "n.", "meaning": "斑马", "section": "gk", "letter": "Z" }, { "word": "zebra crossing", "phonetic": "zebra crossing", "pos": "", "meaning": "人行横道线（斑马线）", "section": "gk", "letter": "Z" }, { "word": "zero", "phonetic": "zero", "pos": "n.", "meaning": "& num. 零；零度；零点", "section": "gk", "letter": "Z" }, { "word": "zoo", "phonetic": "zoo", "pos": "n.", "meaning": "动物园", "section": "gk", "letter": "Z" }, { "word": "zoom", "phonetic": "zoom", "pos": "v.", "meaning": "快速移动，急剧增长", "section": "gk", "letter": "Z" }];

    // 按区块和字母分组
    const SECTIONS = [
      { key: 'zk', name: '中考词汇' },
      { key: 'gk', name: '高考词汇' }
    ];
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    function groupWords() {
      const map = {};
      SECTIONS.forEach(s => {
        map[s.key] = {};
        LETTERS.forEach(l => { map[s.key][l] = []; });
      });
      WORDS.forEach(w => {
        if (map[w.section] && map[w.section][w.letter]) map[w.section][w.letter].push(w);
      });
      return map;
    }

    const grouped = groupWords();

    // 渲染右侧列表
    function renderList() {
      const list = document.getElementById('list');
      let html = '';
      let total = 0;
      SECTIONS.forEach(s => {
        let sectionCount = 0;
        LETTERS.forEach(l => { sectionCount += grouped[s.key][l].length; });
        total += sectionCount;
        html += '<div class="section-block" id="section-' + s.key + '">';
        html += '<div class="section-title">' + s.name + '（' + sectionCount + ' 词）</div>';
        LETTERS.forEach(l => {
          const arr = grouped[s.key][l];
          if (arr.length === 0) return;
          html += '<div class="letter-group" id="letter-' + s.key + '-' + l + '">';
          html += '<div class="letter-header"><span class="letter">' + l + '</span><span class="lcount">' + arr.length + ' 词</span></div>';
          arr.forEach((w, idx) => {
            const id = 'w-' + s.key + '-' + l + '-' + idx;
            html += '<div class="word-row" id="' + id + '">';
            html += '<button class="speak-btn" onclick="speak(this, \'' + escapeAttr(w.phonetic) + '\')" title="朗读3次">🔊</button>';
            html += '<span class="word-text">' + escapeHtml(w.word) + '</span>';
            html += '<span class="word-def">' + (w.pos ? '<span class="pos">' + escapeHtml(w.pos) + '</span>' : '') + escapeHtml(w.meaning) + '</span>';
            html += '</div>';
          });
          html += '</div>';
        });
        html += '</div>';
      });
      list.innerHTML = html;
      document.getElementById('stats').textContent = '共 ' + total + ' 词';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeAttr(s) {
      return String(s).replace(/'/g, "\\'");
    }

    // 渲染左侧目录树
    function renderTree() {
      const tree = document.getElementById('tree');
      let html = '';
      SECTIONS.forEach(s => {
        let sectionCount = 0;
        LETTERS.forEach(l => { sectionCount += grouped[s.key][l].length; });
        html += '<div class="tree-node expanded" id="node-' + s.key + '">';
        html += '<div class="tree-node-row" onclick="toggleNode(\'node-' + s.key + '\')">';
        html += '<span class="tree-toggle">▶</span><span class="tree-label"><span class="section-icon">' + (s.key === 'zk' ? '📘' : '📕') + '</span>' + s.name + '</span><span class="tree-count">' + sectionCount + '</span>';
        html += '</div><div class="tree-children">';
        LETTERS.forEach(l => {
          const arr = grouped[s.key][l];
          if (arr.length === 0) return;
          html += '<div class="tree-node-row" onclick="scrollToLetter(\'' + s.key + '\',\'' + l + '\')">';
          html += '<span class="tree-toggle" style="visibility:hidden">▶</span><span class="tree-label">字母 ' + l + '</span><span class="tree-count">' + arr.length + '</span>';
          html += '</div>';
        });
        html += '</div></div>';
      });
      tree.innerHTML = html;
    }

    function toggleNode(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('expanded');
    }

    function scrollToLetter(section, letter) {
      const el = document.getElementById('letter-' + section + '-' + letter);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        if (window.innerWidth <= 768) toggleSidebar();
      }
    }

    // 搜索
    const searchInput = document.getElementById('searchInput');
    const tree = document.getElementById('tree');
    const searchResults = document.getElementById('searchResults');
    let searchTimer = null;

    searchInput.addEventListener('input', function () {
      clearTimeout(searchTimer);
      const q = this.value.trim().toLowerCase();
      searchTimer = setTimeout(function () { doSearch(q); }, 150);
    });

    function doSearch(q) {
      if (!q) {
        tree.style.display = '';
        searchResults.style.display = 'none';
        searchResults.innerHTML = '';
        return;
      }
      tree.style.display = 'none';
      searchResults.style.display = 'block';
      const matches = WORDS.filter(w =>
        w.word.toLowerCase().indexOf(q) > -1 ||
        w.meaning.toLowerCase().indexOf(q) > -1
      ).slice(0, 200);

      if (matches.length === 0) {
        searchResults.innerHTML = '<div class="search-empty">未找到匹配的单词</div>';
        return;
      }
      let html = '';
      matches.forEach(w => {
        const idx = WORDS.indexOf(w);
        html += '<div class="search-result-item" onclick="jumpToWord(' + idx + ')">';
        html += '<div class="sr-word">' + escapeHtml(w.word) + '</div>';
        html += '<div class="sr-meaning">' + (w.pos ? w.pos + ' ' : '') + escapeHtml(w.meaning) + '</div>';
        html += '</div>';
      });
      searchResults.innerHTML = html;
    }

    function jumpToWord(idx) {
      const w = WORDS[idx];
      const arr = grouped[w.section][w.letter];
      const localIdx = arr.indexOf(w);
      if (localIdx === -1) return;
      const id = 'w-' + w.section + '-' + w.letter + '-' + localIdx;
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.transition = 'background .3s';
        const orig = el.style.background;
        el.style.background = '#fff3bf';
        setTimeout(function () { el.style.background = orig; }, 1200);
      }
      if (window.innerWidth <= 768) toggleSidebar();
    }

    // 发音
    let speakingTimers = [];
    let currentSpeakingBtn = null;
    function speak(btn, text) {
      if (!('speechSynthesis' in window)) { alert('当前浏览器不支持语音合成'); return; }
      // 停止之前的播放和动画
      window.speechSynthesis.cancel();
      speakingTimers.forEach(clearTimeout);
      speakingTimers = [];
      if (currentSpeakingBtn) currentSpeakingBtn.classList.remove('speaking');

      currentSpeakingBtn = btn;
      btn.classList.add('speaking');
      const row = btn.closest('.word-row');
      if (row) row.classList.add('read');

      function sayOnce() {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
      }
      sayOnce();
      speakingTimers.push(setTimeout(sayOnce, 800));
      speakingTimers.push(setTimeout(sayOnce, 1600));
      // 3次后移除动画
      speakingTimers.push(setTimeout(function () {
        btn.classList.remove('speaking');
        if (currentSpeakingBtn === btn) currentSpeakingBtn = null;
      }, 2400));
    }

    // 侧边栏
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('overlay');
      sb.classList.toggle('collapsed');
      if (window.innerWidth <= 768) ov.classList.toggle('show', !sb.classList.contains('collapsed'));
    }

    // 初始化
    renderList();
    renderTree();
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('collapsed');
  </script>
</body>
